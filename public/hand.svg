<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 440" role="img" aria-label="Cartoon hand for nail art">

  <!-- Entire hand tilted 6° for a natural, angled look -->
  <g transform="rotate(6, 155, 275)">

    <!-- Skin group — change fill here to swap skin tone -->
    <g id="skin" fill="#FFCBA4" stroke="#3D2010" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">

      <!-- Palm -->
      <path d="
        M 85 398
        Q 70 380 70 328
        L 70 248
        Q 79 240 88 244
        Q 104 234 120 238
        Q 136 228 153 232
        Q 170 227 186 232
        L 188 260
        C 205 254 220 265 226 280
        L 228 332
        Q 226 376 214 396
        Q 178 412 132 412
        Q 94 410 85 398 Z
      "/>

      <!-- Pinky finger — rx=14 = half width, so top is a full semicircle (chubby cap) -->
      <rect x="74" y="155" width="28" height="95" rx="14"/>

      <!-- Ring finger -->
      <rect x="105" y="105" width="30" height="140" rx="15"/>

      <!-- Middle finger -->
      <rect x="137" y="80" width="32" height="165" rx="16"/>

      <!-- Index finger -->
      <rect x="171" y="98" width="30" height="145" rx="15"/>

      <!-- Thumb: rotated -40° from attachment point on right side of palm -->
      <g transform="translate(220, 274) rotate(-40)">
        <rect x="-14" y="-88" width="28" height="92" rx="14"/>
      </g>

    </g>

    <!-- Knuckle crease lines (drawn outside skin group so they sit on top) -->
    <g fill="none" stroke="#C8855A" stroke-width="1.2" stroke-linecap="round">
      <!-- Pinky -->
      <path d="M 77 207 Q 88 204 99 207"/>
      <path d="M 77 228 Q 88 225 99 228"/>
      <!-- Ring -->
      <path d="M 108 188 Q 120 185 132 188"/>
      <path d="M 108 217 Q 120 214 132 217"/>
      <!-- Middle -->
      <path d="M 140 172 Q 153 169 166 172"/>
      <path d="M 140 207 Q 153 204 166 207"/>
      <!-- Index -->
      <path d="M 174 182 Q 186 179 198 182"/>
      <path d="M 174 215 Q 186 212 198 215"/>
    </g>

    <!-- Nails — off-white blank canvas, ready to be painted -->
    <ellipse id="nail-pinky"  fill="#F5F0EB" stroke="#3D2010" stroke-width="1.8" cx="88"  cy="170" rx="9"  ry="11"/>
    <ellipse id="nail-ring"   fill="#F5F0EB" stroke="#3D2010" stroke-width="1.8" cx="120" cy="120" rx="10" ry="12"/>
    <ellipse id="nail-middle" fill="#F5F0EB" stroke="#3D2010" stroke-width="1.8" cx="153" cy="95"  rx="10" ry="12"/>
    <ellipse id="nail-index"  fill="#F5F0EB" stroke="#3D2010" stroke-width="1.8" cx="186" cy="113" rx="10" ry="12"/>

    <!-- Thumb nail in same local transform as thumb body -->
    <g transform="translate(220, 274) rotate(-40)">
      <ellipse id="nail-thumb" fill="#F5F0EB" stroke="#3D2010" stroke-width="1.8" cx="0" cy="-78" rx="9" ry="10"/>
    </g>

  </g>

</svg>
